name: Deploy PNW Router to Aleo Testnet (Plan Gate)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-validate:
    runs-on: ubuntu-latest

    env:
      LEO_VERSION: 3.5.0
      SNARKOS_VERSION: v4.5.1
      LEO_URL: https://github.com/ProvableHQ/leo/releases/download/v3.5.0/leo-release-3.5-x86_64-unknown-linux-gnu.zip
      SNARKOS_URL: https://github.com/ProvableHQ/snarkOS/releases/download/v4.5.1/aleo-v4.5.1-x86_64-unknown-linux-gnu.zip
      LEO_SHA256: "${{ vars.LEO_SHA256 }}"
      SNARKOS_SHA256: "f32830e828a3e6ecb403bbc3ad6969b05f1b47e5de687f03f09d7662a6fbcd3c"
      STRICT_VERSION_CHECK: "false"

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🛠️ Install Leo CLI (v3.5.0)
        run: |
          curl -L "https://github.com/ProvableHQ/leo/releases/download/v3.5.0/leo-release-3.5-x86_64-unknown-linux-gnu.zip" -o leo.zip
          unzip leo.zip -d /tmp
          sudo mv /tmp/leo /usr/local/bin/leo
          sudo chmod +x /usr/local/bin/leo
          leo --version
      - name: ⚙️ Install snarkOS (v4.5.1)
        run: |
          curl -L "https://github.com/ProvableHQ/snarkOS/releases/download/v4.5.1/aleo-v4.5.1-x86_64-unknown-linux-gnu.zip" -o snarkos.zip
          unzip snarkos.zip -d /tmp
          sudo mv /tmp/snarkos /usr/local/bin/snarkos
          sudo chmod +x /usr/local/bin/snarkos
          snarkos --version

      - name: ✅ Verify pinned CLI versions
        run: scripts/verify_provable_cli.sh

      - name: 🔎 Typecheck Phase 3 planner
        run: npx --yes --package typescript tsc -p portal/tsconfig.phase3.json

      - name: 🔎 Typecheck Phase 4 adapter scaffold
        run: npx --yes --package typescript tsc -p portal/tsconfig.phase4.json

      - name: 🧪 Run Phase 4 adapter codec tests
        run: scripts/run_phase4_adapter_tests.sh

      - name: 📋 Validate testnet manifest schema
        run: python3 scripts/validate_testnet_manifest.py config/testnet.manifest.json

      - name: 🛡️ Enforce Layer 1 public-state leakage guard
        run: python3 scripts/check_layer1_public_leakage_guards.py

      - name: 🛡️ Enforce execute negative-path guards
        run: scripts/check_phase4_negative_path_guards.sh
